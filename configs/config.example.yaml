# nitrogen-fixation-pipeline/config.yaml — example instantiation config
# Copy this file into your instantiation repo and edit for your target.
# Validate with: python config_schema.py --validate config.yaml

project:
  name: "nitrogen-fixation-pipeline"
  application: "nitrogen_fixation"
  description: >
    Identify soil communities with high biological nitrogen fixation potential
    for dryland wheat systems. Target: reduce synthetic N fertilizer dependency.
  version: "0.1.0"

target:
  id: "nitrogen_fixation_dryland_wheat"
  application: "nitrogen_fixation"
  target_function: "biological_nitrogen_fixation"
  target_flux:
    nifH_pathway:
      min: 0.5          # mmol N / g soil / day
      optimal: ">2.0"
      units: "mmol_N_per_g_soil_per_day"
  off_targets:
    - "denitrification"     # N loss — avoid
    - "methane_production"  # GHG — avoid
  soil_context:
    ph_range: [5.5, 7.5]
    texture: ["sandy_loam", "loam", "silt_loam"]
    climate_zone: ["BSk", "BWk", "Csa"]   # semi-arid / dryland Koppen codes
    land_use: ["cropland"]
    crop: "wheat"
  intervention_types:
    - "bioinoculant"
    - "amendment"
    - "management"

sequence_source:
  primary: "sra"
  sra_query:
    biome: "cropland"
    sequencing_type: ["shotgun_metagenome", "16S"]
    min_depth: 50000
    metadata_required: ["soil_ph", "latitude", "longitude", "land_use"]
  supplementary:
    - source: "mgnify"
      biome_lineage: "root:Environmental:Terrestrial:Agricultural soil"
    - source: "emp"
      empo_3: "Soil (non-saline)"

filters:
  t0:
    min_sequencing_depth: 50000
    min_observed_otus: 500
    ph_range: [5.0, 8.5]                    # slightly looser than target
    required_functional_genes: ["nifH"]
    exclude_contaminated: true
    min_soil_organic_matter: 0.5
    exclude_flooded: true
  t025:
    ml_models: ["random_forest_bnf", "gradient_boost_functional"]
    min_function_score: 0.5
    min_target_gene_abundance: 0.001
    reference_db: "reference/high_bnf_communities.biom"
    min_similarity: 0.3
  t1:
    fba_engine: "cobrapy"
    community_size_limit: 20
    genome_db: "patric"
    min_target_flux: 0.5
    max_fba_walltime_min: 30
  t2:
    dynamics_engine: "dfba"
    simulation_time_days: 90
    perturbations:
      - type: "drought"
        day: 45
        severity: 0.5
      - type: "fertilizer_addition"
        day: 0
        amount_kg_ha: 50
    intervention_screen:
      bioinoculants:
        - "Azospirillum_brasilense"
        - "Herbaspirillum_seropedicae"
        - "Gluconacetobacter_diazotrophicus"
        - "Paenibacillus_polymyxa"
      amendments:
        - type: "biochar"
          rates_t_ha: [1, 2, 5]
        - type: "compost"
          rates_t_ha: [2, 5, 10]
    min_stability_score: 0.6
    min_establishment_prob: 0.4

compute:
  workers: 8
  fba_workers: 4
  batch_size: 1000
  t1_batch_size: 50
  t2_batch_size: 5
  checkpoint_interval: 100

output:
  db_path: "nitrogen_landscape.db"
  receipts_dir: "receipts/"
  results_dir: "results/"
  top_n: 50
  export_community_profiles: true
  export_intervention_report: true
