name: sim-model-benchmark-nightly

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  benchmark-stress-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run stress benchmark gate with trend assertion
        run: |
          python -m sim_model.benchmark_gate \
            --seeds 5,7,11,13,17,19 \
            --worlds 320 \
            --candidates 12 \
            --top-k 3 \
            --min-top1-lift 0.03 \
            --min-topk-lift 0.02 \
            --min-regret-reduction 0.25 \
            --min-hit-rate-margin 0.15 \
            --history-path reference/sim_model_benchmark_history.jsonl \
            --trend-window 20 \
            --min-history-entries 1 \
            --fail-on-missing-history \
            --max-top1-lift-drop 0.05 \
            --max-topk-lift-drop 0.05 \
            --max-regret-reduction-drop 0.12 \
            --max-hit-rate-margin-drop 0.12 \
            --append-history-path reference/sim_model_benchmark_history.jsonl \
            --report-json-path results/sim_model_benchmark_latest.json \
            --report-md-path results/sim_model_benchmark_summary.md \
            --append-step-summary \
            --json

      - name: Upload nightly benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sim-model-benchmark-nightly
          path: |
            results/sim_model_benchmark_latest.json
            results/sim_model_benchmark_summary.md
            reference/sim_model_benchmark_history.jsonl
          if-no-files-found: error
